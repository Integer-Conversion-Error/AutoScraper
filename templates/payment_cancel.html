<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled - AutoScraper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: #f8f9fa; }
        .card { max-width: 500px; text-align: center; padding: 2rem; }
        .icon { font-size: 3rem; color: #ffc107; margin-bottom: 1rem; } /* Warning color */
    </style>
</head>
<body>
    <div class="card shadow-sm">
        <div class="icon">&#9888;</div> <!-- Warning icon -->
        <h1 class="h3 mb-3 fw-normal">Payment Cancelled</h1>
        <p class="text-muted">Your payment process was cancelled. You have not been charged.</p>
        <p class="text-muted">If this was a mistake, you can return to the pricing page to try again.</p>
        <a href="{{ url_for('views.pricing') }}" class="btn btn-secondary w-100 mt-3">Return to Pricing</a> <!-- Adjust target URL as needed -->
         <a href="{{ url_for('views.index') }}" class="btn btn-outline-secondary w-100 mt-2">Go to Dashboard</a> <!-- Adjust target URL as needed -->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
